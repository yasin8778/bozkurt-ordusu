<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozkurt Ordusu</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
}
h1{margin-top:10px}
.board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1/1;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}
.square{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:6vw;
}
.white{background:#f0d9b5}
.black{background:#b58863}
.infoBox{
  margin:10px;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}
button,select{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}
.progress{
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}
.progressBar{
  height:100%;
  background:#16a34a;
  width:0%;
}
iframe{
  border-radius:12px;
}
</style>
</head>
<body>

<h1>🇹🇷 Bozkurt Ordusu</h1>
<h3>𐰴𐰍𐰣 – Kağan</h3>
<h4>𐰑𐰓𐰑𐰓 – Dede</h4>

<div class="board" id="board"></div>

<div class="infoBox" id="kaganBox"></div>
<div class="infoBox" id="dedeBox"></div>

<div class="infoBox">
<h3>Günlük Hedef</h3>
Oynanan: <span id="played">0</span> /
Hedef: <input type="number" id="goalInput" value="5" style="width:50px">
<div class="progress"><div class="progressBar" id="progressBar"></div></div>
</div>

<div class="infoBox">
<h3>Türk Müzikleri</h3>
<select id="playlistSelect"></select>
<button onclick="playSelected()">Çal</button>
<button onclick="nextSong()">Sonraki</button>
<button onclick="stopMusic()">Durdur</button>

<iframe id="ytPlayer"
width="100%"
height="180"
allow="autoplay"
src="">
</iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>

const game = new Chess();
const board = document.getElementById("board");
let selected = null;

function drawBoard(){
  board.innerHTML="";
  const squares = game.board();
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const square=document.createElement("div");
      square.className="square "+((r+c)%2==0?"white":"black");
      square.dataset.square=String.fromCharCode(97+c)+(8-r);
      if(squares[r][c]){
        square.textContent=getPieceSymbol(squares[r][c]);
      }
      square.onclick=()=>onSquareClick(square.dataset.square);
      board.appendChild(square);
    }
  }
}

function getPieceSymbol(piece){
  const map={
    p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚"
  };
  return piece.color==="w"?map[piece.type]:map[piece.type];
}

function onSquareClick(square){
  if(selected){
    const move=game.move({from:selected,to:square,promotion:"q"});
    selected=null;
    if(move){
      playMoveSound();
      afterMove();
    }
  }else{
    selected=square;
  }
  drawBoard();
}

function afterMove(){
  if(game.in_check()){
    playCheckSound();
    dede("Şah darda kaldı, akıl gerek şimdi.");
  }else{
    dede("Yiğit taşını yerli yerine koydu.");
  }

  if(game.in_checkmate()){
    playMateSound();
    dede("Sabreden er muradına erdi.");
    incrementGames();
  }
}

function kagan(text){
  document.getElementById("kaganBox").innerText="Kağan: "+text;
}
function dede(text){
  document.getElementById("dedeBox").innerText="Dede: "+text;
}

kagan("Er meydanı kuruldu. Börüler yerini alsın.");
drawBoard();

/* Günlük hedef sistemi */
function incrementGames(){
  let played=Number(localStorage.getItem("played")||0);
  played++;
  localStorage.setItem("played",played);
  updateProgress();
}

function updateProgress(){
  const played=Number(localStorage.getItem("played")||0);
  const goal=Number(document.getElementById("goalInput").value);
  document.getElementById("played").innerText=played;
  document.getElementById("progressBar").style.width=
  Math.min(100,(played/goal)*100)+"%";
}

updateProgress();

/* Müzik sistemi */
const TURK_PLAYLIST=[
{title:"İstiklal Marşı",id:"fhIIU_a6bv8"},
{title:"Enver Paşa",id:"agveHbFsogM"},
{title:"Bozkurt Ordusu",id:"LAEiecMIFuc"},
{title:"Dombra",id:"NQCT-nfjVZU"},
{title:"Er Turan",id:"Z4fKe_EGw7k"},
{title:"Tengir Azun",id:"pGzG6FzjGgA"},
{title:"Andımız",id:"hG2L1QacdsM"}
];

const select=document.getElementById("playlistSelect");
const player=document.getElementById("ytPlayer");
let currentIndex=0;

TURK_PLAYLIST.forEach((item,i)=>{
  const opt=document.createElement("option");
  opt.value=i;
  opt.textContent=item.title;
  select.appendChild(opt);
});

function playSelected(){
  const index=parseInt(select.value);
  currentIndex=index;
  player.src=`https://www.youtube.com/embed/${TURK_PLAYLIST[index].id}?autoplay=1`;
}
function nextSong(){
  currentIndex=(currentIndex+1)%TURK_PLAYLIST.length;
  select.value=currentIndex;
  playSelected();
}
function stopMusic(){
  player.src="";
}

/* Ses efektleri */
function playMoveSound(){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  o.frequency.value=300;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.1);
}
function playCheckSound(){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  o.frequency.value=600;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.2);
}
function playMateSound(){
  const ctx=new AudioContext();
  const o=ctx.createOscillator();
  o.frequency.value=150;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.5);
}

</script>

</body>
  </html>
