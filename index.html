<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bozkurt Ordusu Satranç</title>

  <!-- Chessboard.js (tahta) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />

  <style>
    :root{
      --bg:#0f1115;
      --panel:#151824;
      --text:#e8e8e8;
      --muted:#a7adbb;
      --btn:#2b6cff;
      --btn2:#2a2f45;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      display:flex;
      justify-content:center;
      padding: 14px;
    }
    .wrap{
      width: min(520px, 100%);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background: var(--panel);
      border-radius:14px;
      padding:12px 12px;
      gap:10px;
    }
    .title{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width: 0;
    }
    .title b{ font-size:16px; }
    .title span{ font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .btns{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    button, select{
      appearance:none;
      border:0;
      border-radius:12px;
      padding:10px 12px;
      color:var(--text);
      background: var(--btn2);
      font-weight:600;
      cursor:pointer;
      font-size:14px;
    }
    button.primary{ background: var(--btn); }
    select{ font-weight:700; }
    .boardCard{
      background: var(--panel);
      border-radius:18px;
      padding:12px;
    }
    #board{
      width: 100%;
      max-width: 496px;
      margin: 0 auto;
      border-radius:14px;
      overflow:hidden;
    }
    .status{
      background: var(--panel);
      border-radius:14px;
      padding:12px;
      font-size:13px;
      line-height:1.35;
      color: var(--muted);
    }
    .status b{ color: var(--text); }
    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .pill{
      background:#0f1322;
      border:1px solid #232845;
      color:var(--muted);
      padding:8px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <b>Bozkurt Ordusu</b>
        <span>Motor: Stockfish • Kurallar: chess.js</span>
      </div>

      <div class="btns">
        <select id="skill">
          <option value="3">AI: Kolay</option>
          <option value="8" selected>AI: Orta</option>
          <option value="15">AI: Zor</option>
          <option value="20">AI: Usta</option>
        </select>
        <button id="flipBtn">Tahtayı Çevir</button>
        <button class="primary" id="resetBtn">Yeniden Başlat</button>
      </div>
    </div>

    <div class="boardCard">
      <div id="board"></div>
    </div>

    <div class="status" id="status">
      <b>Durum:</b> Yükleniyor...
      <div class="row">
        <div class="pill" id="turnPill">Sıra: -</div>
        <div class="pill" id="enginePill">Motor: -</div>
        <div class="pill" id="evalPill">Değerlendirme: -</div>
      </div>
    </div>
  </div>

  <!-- Gerekli kütüphaneler -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

  <!-- Stockfish (Web Worker gibi çalışır) -->
  <script src="https://cdn.jsdelivr.net/npm/stockfish@16.0.0/src/stockfish.js"></script>

  <script>
    // ====== OYUN + TAHTA ======
    const game = new Chess();
    let board = null;

    // ====== MOTOR ======
    let engine = null;
    let engineReady = false;
    let thinking = false;
    let lastEval = null;

    const statusEl = document.getElementById("status");
    const turnPill = document.getElementById("turnPill");
    const enginePill = document.getElementById("enginePill");
    const evalPill = document.getElementById("evalPill");
    const skillSel = document.getElementById("skill");

    function uiStatus(text){
      statusEl.firstChild.textContent = "";
      statusEl.innerHTML = `<b>Durum:</b> ${text}
        <div class="row">
          <div class="pill" id="turnPill">Sıra: ${game.turn()==="w" ? "Beyaz" : "Siyah"}</div>
          <div class="pill" id="enginePill">Motor: ${engineReady ? "Hazır" : "Hazırlanıyor"}</div>
          <div class="pill" id="evalPill">Değerlendirme: ${lastEval ?? "-"}</div>
        </div>`;
    }

    function initBoard(){
      const cfg = {
        draggable: true,
        position: "start",
        pieceTheme: "https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/img/chesspieces/wikipedia/{piece}.png",
        onDragStart,
        onDrop,
        onSnapEnd
      };
      board = Chessboard("board", cfg);
      window.addEventListener("resize", () => board.resize());
      uiStatus("Hazır. Taşları sürükleyerek oyna.");
    }

    function onDragStart(source, piece){
      if (thinking) return false; // motor düşünürken hamle yok
      if (game.game_over()) return false;

      // sadece sıradaki renk oynasın
      if (game.turn() === "w" && piece.startsWith("b")) return false;
      if (game.turn() === "b" && piece.startsWith("w")) return false;

      // mobilde yanlış sürüklemeleri azaltmak için:
      return true;
    }

    function onDrop(source, target){
      // terfi varsa otomatik vezir
      const moveObj = { from: source, to: target, promotion: "q" };
      const move = game.move(moveObj);

      if (move === null) return "snapback"; // illegal hamle

      updateBoardAndState("Sen oynadın: " + move.san);

      // oyuncu hamlesinden sonra AI oynasın
      setTimeout(makeAIMove, 80);
    }

    function onSnapEnd(){
      board.position(game.fen());
    }

    function updateBoardAndState(msg){
      board.position(game.fen(), false);
      uiStatus(msg + (game.in_check() ? " • ŞAH!" : ""));
      if (game.game_over()){
        let end = "Oyun bitti.";
        if (game.in_checkmate()) end = "ŞAH MAT!";
        else if (game.in_stalemate()) end = "PAT (Berabere).";
        else if (game.in_draw()) end = "Berabere.";
        uiStatus(msg + " • " + end);
      }
    }

    // ====== STOCKFISH KURULUM ======
    function initEngine(){
      try{
        engine = STOCKFISH(); // stockfish.js global fonksiyon
      }catch(e){
        uiStatus("Motor yüklenemedi. İnternet/CDN erişimi kontrol et.");
        console.error(e);
        return;
      }

      engine.onmessage = (line) => {
        const text = typeof line === "string" ? line : (line?.data || "");
        // console.log("SF:", text);

        if (text === "uciok") {
          engine.postMessage("isready");
          return;
        }

        if (text === "readyok") {
          engineReady = true;
          applySkill();
          uiStatus("Motor hazır. Oynamaya başla.");
          // ilk konum değerlendirmesi
          requestEval();
          return;
        }

        if (text.startsWith("info")) {
          // Basit eval yakalama (cp veya mate)
          // örnek: info depth 12 score cp 34 ...
          const mCp = text.match(/score cp (-?\d+)/);
          const mMate = text.match(/score mate (-?\d+)/);
          if (mMate) lastEval = `#${mMate[1]}`;
          else if (mCp) {
            const cp = parseInt(mCp[1], 10);
            // cp -> piyon birimi (100cp=1.00)
            lastEval = (cp/100).toFixed(2);
          }
          // UI’ı çok sık güncellememek için:
          // ama yine de kullanıcı görsün:
          // (oyun sırasında anlık değişebilir)
          // uiStatus("Motor düşünüyor...");
          return;
        }

        if (text.startsWith("bestmove")) {
          const parts = text.split(" ");
          const best = parts[1]; // e2e4 gibi
          if (!best || best === "(none)") {
            thinking = false;
            updateBoardAndState("Motor hamle bulamadı.");
            return;
          }

          const from = best.substring(0,2);
          const to = best.substring(2,4);
          let promo = best.length >= 5 ? best[4] : null;

          const move = game.move({
            from, to,
            promotion: promo ? promo : "q"
          });

          thinking = false;

          if (move) {
            updateBoardAndState("Motor oynadı: " + move.san);
            requestEval();
          } else {
            updateBoardAndState("Motor geçersiz hamle üretti (nadir).");
          }
          return;
        }
      };

      engine.postMessage("uci");
      uiStatus("Motor hazırlanıyor...");
    }

    function applySkill(){
      if (!engineReady) return;
      const skill = parseInt(skillSel.value, 10);
      // skill level 0-20
      engine.postMessage(`setoption name Skill Level value ${skill}`);
      // hareketleri biraz daha insancıl yap (isteğe bağlı)
      engine.postMessage(`setoption name Move Overhead value 50`);
    }

    skillSel.addEventListener("change", () => {
      applySkill();
      requestEval();
    });

    // ====== AI HAMLESİ ======
    function makeAIMove(){
      if (!engineReady) { uiStatus("Motor hazır değil."); return; }
      if (game.game_over()) return;
      if (thinking) return;

      // AI her zaman sıradaki oyuncu için oynar.
      thinking = true;
      uiStatus("Motor düşünüyor...");

      engine.postMessage("ucinewgame");
      engine.postMessage("position fen " + game.fen());

      // derinlik: cihazına göre ayarlı (mobil için makul)
      const skill = parseInt(skillSel.value, 10);
      const depth = skill <= 3 ? 8 : skill <= 8 ? 10 : skill <= 15 ? 12 : 14;

      engine.postMessage("go depth " + depth);
    }

    function requestEval(){
      if (!engineReady) return;
      // kısa bir değerlendirme isteği (çok ağır olmasın)
      engine.postMessage("position fen " + game.fen());
      engine.postMessage("go depth 10");
    }

    // ====== BUTONLAR ======
    document.getElementById("resetBtn").addEventListener("click", () => {
      game.reset();
      lastEval = null;
      board.start();
      thinking = false;
      uiStatus("Yeni oyun başladı. Beyaz başlar.");
      requestEval();
    });

    document.getElementById("flipBtn").addEventListener("click", () => {
      board.flip();
    });

    // ====== BAŞLAT ======
    initBoard();
    initEngine();
  </script>
</body>
  </html>
