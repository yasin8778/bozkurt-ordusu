<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozkurt Ordusu Satranç</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#111;
  margin:0;
}

.board{
  display:grid;
  grid-template-columns:repeat(8,60px);
  grid-template-rows:repeat(8,60px);
  user-select:none;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:38px;
  cursor:pointer;
}

.light{ background:#f0d9b5; }
.dark{ background:#b58863; }

.selected{
  outline:3px solid red;
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

let position = [
  "♜","♞","♝","♛","♚","♝","♞","♜",
  "♟","♟","♟","♟","♟","♟","♟","♟",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "","","","","","","","",
  "♙","♙","♙","♙","♙","♙","♙","♙",
  "♖","♘","♗","♕","♔","♗","♘","♖"
];

let selectedIndex = null;

function drawBoard(){
  board.innerHTML = "";

  for(let i=0;i<64;i++){
    const square = document.createElement("div");
    square.classList.add("square");

    if((Math.floor(i/8)+i)%2===0){
      square.classList.add("light");
    } else {
      square.classList.add("dark");
    }

    square.textContent = position[i];

    if(i === selectedIndex){
      square.classList.add("selected");
    }

    square.addEventListener("click", () => {

      // Eğer seçim yoksa ve taş varsa seç
      if(selectedIndex === null && position[i] !== ""){
        selectedIndex = i;
        drawBoard();
        return;
      }

      // Aynı kareye tekrar basılırsa iptal
      if(selectedIndex === i){
        selectedIndex = null;
        drawBoard();
        return;
      }

      // Eğer seçim varsa taşı taşı
      if(selectedIndex !== null){
        position[i] = position[selectedIndex];
        position[selectedIndex] = "";
        selectedIndex = null;
        drawBoard();
      }

    });

    board.appendChild(square);
  }
}

drawBoard();
</script>

</body>
</html>
