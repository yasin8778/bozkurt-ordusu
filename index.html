<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozkurt Ordusu Satranç</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}
.board{
    display:grid;
    grid-template-columns:repeat(8,60px);
    grid-template-rows:repeat(8,60px);
}
.square{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    cursor:pointer;
}
.white{background:#f0d9b5;}
.black{background:#b58863;}
</style>
</head>
<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");
const pieces = {
r:"♜", n:"♞", b:"♝", q:"♛", k:"♚", p:"♟",
R:"♖", N:"♘", B:"♗", Q:"♕", K:"♔", P:"♙"
};

let startPosition = [
"rnbqkbnr",
"pppppppp",
"........",
"........",
"........",
"........",
"PPPPPPPP",
"RNBQKBNR"
];

function drawBoard(){
    board.innerHTML="";
    for(let r=0;r<8;r++){
        for(let c=0;c<8;c++){
            const square=document.createElement("div");
            square.className="square "+((r+c)%2==0?"white":"black");
            let piece=startPosition[r][c];
            if(piece!="."){
                square.textContent=pieces[piece];
            }
            board.appendChild(square);
        }
    }
}

drawBoard();
</script>

</body>
</html>
